services:
  postgres:
    image: postgres:15
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: oncallshift
      POSTGRES_USER: oncallshift
      POSTGRES_PASSWORD: localdev
    volumes:
      - oncallshift_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oncallshift"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  oncallshift_data:

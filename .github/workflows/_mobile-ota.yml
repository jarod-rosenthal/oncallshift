name: Mobile OTA Updates

# Only callable from orchestrator - no standalone triggers
on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string
      channel:
        description: 'EAS Update channel (development, preview, production)'
        required: true
        type: string
      message:
        description: 'Update message describing changes'
        required: false
        type: string
        default: 'Deploy from GitHub Actions'

env:
  NODE_VERSION: '20'

jobs:
  publish-ota:
    name: Publish OTA Update
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate channel
        run: |
          CHANNEL="${{ inputs.channel }}"
          if [[ ! "$CHANNEL" =~ ^(development|preview|production)$ ]]; then
            echo "❌ Invalid channel: $CHANNEL"
            echo "   Valid channels: development, preview, production"
            exit 1
          fi
          echo "✅ Channel validated: $CHANNEL"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: Publish OTA update
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          MESSAGE="${{ inputs.message }}"
          CHANNEL="${{ inputs.channel }}"

          # If no custom message provided, use commit message
          if [ "$MESSAGE" = "Deploy from GitHub Actions" ]; then
            MESSAGE="Deploy: $(git log -1 --pretty=%B | head -1)"
          fi

          echo "📱 Publishing OTA update..."
          echo "Channel: $CHANNEL"
          echo "Message: $MESSAGE"

          eas update \
            --branch "$CHANNEL" \
            --message "$MESSAGE" \
            --non-interactive

      - name: OTA update summary
        run: |
          echo "✅ OTA update published!"
          echo "======================="
          echo "Environment: ${{ inputs.environment }}"
          echo "Channel: ${{ inputs.channel }}"
          echo "Message: ${{ inputs.message }}"
          echo ""
          echo "📱 Users on the '${{ inputs.channel }}' channel will receive this update:"
          echo "   - Automatically on next app restart"
          echo "   - Or via 'Check for Updates' in Settings"
          echo ""
          echo "🔗 View update status:"
          echo "   https://expo.dev/accounts/jarod.rosenthal/projects/oncallshift-ft2ynzapva2fgiwgezhv1/updates"

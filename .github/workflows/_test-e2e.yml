name: E2E Tests (Playwright)

# Only callable from orchestrator - no standalone triggers
on:
  workflow_call:

jobs:
  test:
    name: E2E Tests (Shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: e2e
        run: npm install

      - name: Install Playwright (Chromium only)
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests (Shard ${{ matrix.shard }}/2)
        working-directory: e2e
        env:
          BASE_URL: https://oncallshift.com
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          npx playwright test --shard=${{ matrix.shard }}/2

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload test traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces-shard-${{ matrix.shard }}
          path: e2e/test-results/
          retention-days: 30

  # Merge reports from all shards
  merge-reports:
    name: Merge E2E Reports
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports
          pattern: playwright-report-shard-*

      - name: Install dependencies
        working-directory: e2e
        run: npm install

      - name: Merge reports
        working-directory: e2e
        run: |
          # Create merged report directory
          mkdir -p merged-report

          # Copy all shard reports
          for dir in ../all-reports/playwright-report-shard-*; do
            if [ -d "$dir" ]; then
              cp -r "$dir"/* merged-report/ 2>/dev/null || true
            fi
          done

          echo "E2E Test Reports Merged"
          echo "======================="
          ls -la merged-report/ || echo "No reports to merge"

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merged
          path: e2e/merged-report/
          retention-days: 30

      - name: E2E test summary
        run: |
          echo "E2E Test Results"
          echo "================"
          echo ""

          # Fail if any shard failed
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ One or more E2E test shards failed"
            echo "Download test traces artifact for failure details"
            exit 1
          fi

          echo "✅ All E2E test shards passed"
          echo "Download the merged report artifact for full results."

name: Backend (API + Workers)

# Only callable from orchestrator - no standalone triggers
on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string
      dry_run:
        description: 'Dry run - build only, no push or deploy'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1

jobs:
  build-and-deploy:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        id: set-vars
        run: |
          ENV="${{ inputs.environment }}"
          ACCOUNT_ID="593971626975"

          echo "ECR_REGISTRY=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT
          echo "ECR_API_REPO=pagerduty-lite-${ENV}-api" >> $GITHUB_OUTPUT
          echo "ECR_WORKER_REPO=pagerduty-lite-${ENV}-notification-worker" >> $GITHUB_OUTPUT
          echo "ECS_CLUSTER=pagerduty-lite-${ENV}" >> $GITHUB_OUTPUT
          echo "ECS_API_SERVICE=pagerduty-lite-${ENV}-api" >> $GITHUB_OUTPUT
          echo "ECS_WORKER_SERVICE=pagerduty-lite-${ENV}-notification-worker" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: inputs.dry_run != true
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (dry run)
        if: inputs.dry_run == true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: |
            ${{ steps.set-vars.outputs.ECR_REGISTRY }}/${{ steps.set-vars.outputs.ECR_API_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image (dry run)
        if: inputs.dry_run == true
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: false
          tags: |
            ${{ steps.set-vars.outputs.ECR_REGISTRY }}/${{ steps.set-vars.outputs.ECR_WORKER_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API image
        if: inputs.dry_run != true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.set-vars.outputs.ECR_REGISTRY }}/${{ steps.set-vars.outputs.ECR_API_REPO }}:${{ github.sha }}
            ${{ steps.set-vars.outputs.ECR_REGISTRY }}/${{ steps.set-vars.outputs.ECR_API_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        if: inputs.dry_run != true
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: |
            ${{ steps.set-vars.outputs.ECR_REGISTRY }}/${{ steps.set-vars.outputs.ECR_WORKER_REPO }}:${{ github.sha }}
            ${{ steps.set-vars.outputs.ECR_REGISTRY }}/${{ steps.set-vars.outputs.ECR_WORKER_REPO }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy API to ECS
        if: inputs.dry_run != true
        run: |
          aws ecs update-service \
            --cluster ${{ steps.set-vars.outputs.ECS_CLUSTER }} \
            --service ${{ steps.set-vars.outputs.ECS_API_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Worker to ECS
        if: inputs.dry_run != true
        run: |
          aws ecs update-service \
            --cluster ${{ steps.set-vars.outputs.ECS_CLUSTER }} \
            --service ${{ steps.set-vars.outputs.ECS_WORKER_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for API service to stabilize
        if: inputs.dry_run != true
        run: |
          echo "Waiting for API service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ steps.set-vars.outputs.ECS_CLUSTER }} \
            --services ${{ steps.set-vars.outputs.ECS_API_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Worker service to stabilize
        if: inputs.dry_run != true
        run: |
          echo "Waiting for Worker service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ steps.set-vars.outputs.ECS_CLUSTER }} \
            --services ${{ steps.set-vars.outputs.ECS_WORKER_SERVICE }} \
            --region ${{ env.AWS_REGION }}

      - name: Dry run summary
        if: inputs.dry_run == true
        run: |
          echo "🔍 DRY RUN - Backend Build Summary"
          echo "===================================="
          echo "Environment: ${{ inputs.environment }}"
          echo ""
          echo "Would build and push:"
          echo "  - API Image: ${{ steps.set-vars.outputs.ECR_REGISTRY }}/${{ steps.set-vars.outputs.ECR_API_REPO }}:${{ github.sha }}"
          echo "  - Worker Image: ${{ steps.set-vars.outputs.ECR_REGISTRY }}/${{ steps.set-vars.outputs.ECR_WORKER_REPO }}:${{ github.sha }}"
          echo ""
          echo "Would deploy to:"
          echo "  - Cluster: ${{ steps.set-vars.outputs.ECS_CLUSTER }}"
          echo "  - API Service: ${{ steps.set-vars.outputs.ECS_API_SERVICE }}"
          echo "  - Worker Service: ${{ steps.set-vars.outputs.ECS_WORKER_SERVICE }}"
          echo ""
          echo "⚠️  DRY RUN MODE - No images pushed, no deployments made"

      - name: Backend deployment summary
        if: inputs.dry_run != true
        run: |
          echo "✅ Backend deployment complete!"
          echo "Environment: ${{ inputs.environment }}"
          echo "API Image: ${{ steps.set-vars.outputs.ECR_REGISTRY }}/${{ steps.set-vars.outputs.ECR_API_REPO }}:${{ github.sha }}"
          echo "Worker Image: ${{ steps.set-vars.outputs.ECR_REGISTRY }}/${{ steps.set-vars.outputs.ECR_WORKER_REPO }}:${{ github.sha }}"

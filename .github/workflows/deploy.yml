name: Deploy Pipeline

# Manual trigger only - no automatic deployments
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      deploy_infra:
        description: 'Deploy Infrastructure (Terraform)'
        required: false
        default: false
        type: boolean
      auto_approve_infra:
        description: 'Auto-approve Terraform changes (skip issue approval)'
        required: false
        default: false
        type: boolean
      deploy_backend:
        description: 'Deploy Backend (API + Workers)'
        required: false
        default: true
        type: boolean
      deploy_frontend:
        description: 'Deploy Frontend (S3 + CloudFront)'
        required: false
        default: true
        type: boolean
      deploy_mobile:
        description: 'Deploy Mobile (Expo EAS Build - slow, creates new APK)'
        required: false
        default: false
        type: boolean
      deploy_mobile_ota:
        description: 'Deploy Mobile OTA (Fast JavaScript-only update)'
        required: false
        default: false
        type: boolean
      mobile_ota_channel:
        description: 'Mobile OTA channel (if OTA enabled)'
        required: false
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      dry_run:
        description: 'Dry Run - show what would happen without deploying'
        required: false
        default: false
        type: boolean

# Permissions needed by child workflows
permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  # Determine environment from branch or input
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      deploy_infra: ${{ steps.set-flags.outputs.deploy_infra }}
      auto_approve_infra: ${{ steps.set-flags.outputs.auto_approve_infra }}
      deploy_backend: ${{ steps.set-flags.outputs.deploy_backend }}
      deploy_frontend: ${{ steps.set-flags.outputs.deploy_frontend }}
      deploy_mobile: ${{ steps.set-flags.outputs.deploy_mobile }}
      deploy_mobile_ota: ${{ steps.set-flags.outputs.deploy_mobile_ota }}
      mobile_ota_channel: ${{ steps.set-flags.outputs.mobile_ota_channel }}
      dry_run: ${{ steps.set-flags.outputs.dry_run }}
    steps:
      - name: Determine environment
        id: set-env
        run: |
          echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT

      - name: Set deployment flags
        id: set-flags
        run: |
          echo "deploy_infra=${{ inputs.deploy_infra }}" >> $GITHUB_OUTPUT
          echo "auto_approve_infra=${{ inputs.auto_approve_infra }}" >> $GITHUB_OUTPUT
          echo "deploy_backend=${{ inputs.deploy_backend }}" >> $GITHUB_OUTPUT
          echo "deploy_frontend=${{ inputs.deploy_frontend }}" >> $GITHUB_OUTPUT
          echo "deploy_mobile=${{ inputs.deploy_mobile }}" >> $GITHUB_OUTPUT
          echo "deploy_mobile_ota=${{ inputs.deploy_mobile_ota }}" >> $GITHUB_OUTPUT
          echo "mobile_ota_channel=${{ inputs.mobile_ota_channel }}" >> $GITHUB_OUTPUT
          echo "dry_run=${{ inputs.dry_run }}" >> $GITHUB_OUTPUT

      - name: Display configuration
        run: |
          echo "🚀 Deployment Configuration"
          echo "Environment: ${{ steps.set-env.outputs.environment }}"
          echo "Dry Run: ${{ steps.set-flags.outputs.dry_run }}"
          echo "Deploy Infra: ${{ steps.set-flags.outputs.deploy_infra }}"
          echo "Deploy Backend: ${{ steps.set-flags.outputs.deploy_backend }}"
          echo "Deploy Frontend: ${{ steps.set-flags.outputs.deploy_frontend }}"
          echo "Deploy Mobile (Full Build): ${{ steps.set-flags.outputs.deploy_mobile }}"
          echo "Deploy Mobile (OTA): ${{ steps.set-flags.outputs.deploy_mobile_ota }}"
          if [ "${{ steps.set-flags.outputs.deploy_mobile_ota }}" = "true" ]; then
            echo "  OTA Channel: ${{ steps.set-flags.outputs.mobile_ota_channel }}"
          fi
          if [ "${{ steps.set-flags.outputs.dry_run }}" = "true" ]; then
            echo ""
            echo "⚠️  DRY RUN MODE - No actual deployments will occur"
          fi

  # Stage 1: Infrastructure (Terraform)
  infrastructure:
    name: Infrastructure
    needs: setup
    if: needs.setup.outputs.deploy_infra == 'true'
    uses: ./.github/workflows/_infra.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      auto_approve: ${{ needs.setup.outputs.auto_approve_infra == 'true' }}
      dry_run: ${{ needs.setup.outputs.dry_run == 'true' }}
    secrets: inherit

  # Stage 2: Backend (API + Workers)
  backend:
    name: Backend
    needs: [setup, infrastructure]
    if: |
      always() &&
      needs.setup.outputs.deploy_backend == 'true' &&
      (needs.infrastructure.result == 'success' || needs.infrastructure.result == 'skipped')
    uses: ./.github/workflows/_backend.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      dry_run: ${{ needs.setup.outputs.dry_run == 'true' }}
    secrets: inherit

  # Stage 3: Frontend (S3 + CloudFront)
  frontend:
    name: Frontend
    needs: [setup, backend]
    if: |
      always() &&
      needs.setup.outputs.deploy_frontend == 'true' &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped')
    uses: ./.github/workflows/_frontend.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      dry_run: ${{ needs.setup.outputs.dry_run == 'true' }}
    secrets: inherit

  # Stage 4a: Mobile Full Build (Expo EAS)
  mobile:
    name: Mobile (Full Build)
    needs: [setup, frontend]
    if: |
      always() &&
      needs.setup.outputs.deploy_mobile == 'true' &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    uses: ./.github/workflows/_mobile.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      dry_run: ${{ needs.setup.outputs.dry_run == 'true' }}
    secrets: inherit

  # Stage 4b: Mobile OTA Update (Fast deployment)
  mobile-ota:
    name: Mobile (OTA Update)
    needs: [setup, frontend]
    if: |
      always() &&
      needs.setup.outputs.deploy_mobile_ota == 'true' &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    uses: ./.github/workflows/_mobile-ota.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      channel: ${{ needs.setup.outputs.mobile_ota_channel }}
      message: 'Deploy from GitHub Actions'
    secrets: inherit

  # Summary
  summary:
    name: Deployment Summary
    needs: [setup, infrastructure, backend, frontend, mobile, mobile-ota]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Summary
        run: |
          echo "🏁 Deployment Pipeline Complete"
          echo "================================"
          echo "Environment: ${{ needs.setup.outputs.environment }}"
          echo ""
          echo "Stage Results:"
          echo "  Infrastructure: ${{ needs.infrastructure.result || 'skipped' }}"
          echo "  Backend: ${{ needs.backend.result || 'skipped' }}"
          echo "  Frontend: ${{ needs.frontend.result || 'skipped' }}"
          echo "  Mobile (Full Build): ${{ needs.mobile.result || 'skipped' }}"
          echo "  Mobile (OTA): ${{ needs.mobile-ota.result || 'skipped' }}"

      - name: Check for failures
        if: |
          needs.infrastructure.result == 'failure' ||
          needs.backend.result == 'failure' ||
          needs.frontend.result == 'failure' ||
          needs.mobile.result == 'failure' ||
          needs.mobile-ota.result == 'failure'
        run: |
          echo "❌ One or more stages failed!"
          exit 1

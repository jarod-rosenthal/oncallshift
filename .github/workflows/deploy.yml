name: Deploy

# Triggers:
# 1. Automatic on PR merge to main (deploys backend + frontend)
# 2. Manual via CLI with `gh workflow run deploy`
#
# Manual examples:
#   gh workflow run deploy                              # Full deployment (backend + frontend)
#   gh workflow run deploy -f deploy_backend=false     # Frontend only
#   gh workflow run deploy -f deploy_frontend=false    # Backend only
#   gh workflow run deploy -f dry_run=true             # Dry run (build only)
on:
  pull_request:
    types: [closed]
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod
      deploy_infra:
        description: 'Deploy Infrastructure (Terraform)'
        required: false
        default: false
        type: boolean
      auto_approve_infra:
        description: 'Auto-approve Terraform changes (skip issue approval)'
        required: false
        default: false
        type: boolean
      deploy_backend:
        description: 'Deploy Backend (API + all workers)'
        required: false
        default: true
        type: boolean
      deploy_frontend:
        description: 'Deploy Frontend (S3 + CloudFront)'
        required: false
        default: true
        type: boolean
      deploy_mobile:
        description: 'Deploy Mobile (Expo EAS Build - slow, creates new APK)'
        required: false
        default: false
        type: boolean
      deploy_mobile_ota:
        description: 'Deploy Mobile OTA (Fast JavaScript-only update)'
        required: false
        default: false
        type: boolean
      mobile_ota_channel:
        description: 'Mobile OTA channel (if OTA enabled)'
        required: false
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production
      dry_run:
        description: 'Dry Run - build only, no actual deployment'
        required: false
        default: false
        type: boolean

# Permissions needed by child workflows
permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  # Display configuration and set outputs
  setup:
    name: Setup
    runs-on: ubuntu-latest
    # Only run on merged PRs or manual dispatch (skip closed-but-not-merged PRs)
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    outputs:
      environment: ${{ steps.config.outputs.environment }}
      deploy_infra: ${{ steps.config.outputs.deploy_infra }}
      auto_approve_infra: ${{ steps.config.outputs.auto_approve_infra }}
      deploy_backend: ${{ steps.config.outputs.deploy_backend }}
      deploy_frontend: ${{ steps.config.outputs.deploy_frontend }}
      deploy_mobile: ${{ steps.config.outputs.deploy_mobile }}
      deploy_mobile_ota: ${{ steps.config.outputs.deploy_mobile_ota }}
      mobile_ota_channel: ${{ steps.config.outputs.mobile_ota_channel }}
      dry_run: ${{ steps.config.outputs.dry_run }}
    steps:
      - name: Set configuration
        id: config
        run: |
          # For PR merge events, use sensible defaults
          # For workflow_dispatch, use the provided inputs
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "deploy_infra=false" >> $GITHUB_OUTPUT
            echo "auto_approve_infra=false" >> $GITHUB_OUTPUT
            echo "deploy_backend=true" >> $GITHUB_OUTPUT
            echo "deploy_frontend=true" >> $GITHUB_OUTPUT
            echo "deploy_mobile=false" >> $GITHUB_OUTPUT
            echo "deploy_mobile_ota=false" >> $GITHUB_OUTPUT
            echo "mobile_ota_channel=preview" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
            echo "deploy_infra=${{ inputs.deploy_infra }}" >> $GITHUB_OUTPUT
            echo "auto_approve_infra=${{ inputs.auto_approve_infra }}" >> $GITHUB_OUTPUT
            echo "deploy_backend=${{ inputs.deploy_backend }}" >> $GITHUB_OUTPUT
            echo "deploy_frontend=${{ inputs.deploy_frontend }}" >> $GITHUB_OUTPUT
            echo "deploy_mobile=${{ inputs.deploy_mobile }}" >> $GITHUB_OUTPUT
            echo "deploy_mobile_ota=${{ inputs.deploy_mobile_ota }}" >> $GITHUB_OUTPUT
            echo "mobile_ota_channel=${{ inputs.mobile_ota_channel }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ inputs.dry_run }}" >> $GITHUB_OUTPUT
          fi

      - name: Display configuration
        run: |
          echo "========================================"
          echo "DEPLOYMENT CONFIGURATION"
          echo "========================================"
          echo "Trigger: ${{ github.event_name }}"
          echo "Environment: ${{ steps.config.outputs.environment }}"
          echo "Dry Run: ${{ steps.config.outputs.dry_run }}"
          echo ""
          echo "Components to deploy:"
          echo "  Infrastructure (Terraform): ${{ steps.config.outputs.deploy_infra }}"
          if [ "${{ steps.config.outputs.deploy_infra }}" = "true" ]; then
            echo "    Auto-approve: ${{ steps.config.outputs.auto_approve_infra }}"
          fi
          echo "  Backend (API + Workers): ${{ steps.config.outputs.deploy_backend }}"
          echo "  Frontend (S3 + CloudFront): ${{ steps.config.outputs.deploy_frontend }}"
          echo "  Mobile (Full Build): ${{ steps.config.outputs.deploy_mobile }}"
          echo "  Mobile (OTA Update): ${{ steps.config.outputs.deploy_mobile_ota }}"
          if [ "${{ steps.config.outputs.deploy_mobile_ota }}" = "true" ]; then
            echo "    OTA Channel: ${{ steps.config.outputs.mobile_ota_channel }}"
          fi
          echo ""
          if [ "${{ steps.config.outputs.dry_run }}" = "true" ]; then
            echo "** DRY RUN MODE - No actual deployments will occur **"
          fi
          echo "========================================"

  # Stage 1: Infrastructure (Terraform) - runs first if enabled
  infrastructure:
    name: Infrastructure
    needs: setup
    if: needs.setup.outputs.deploy_infra == 'true'
    uses: ./.github/workflows/_infra.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      auto_approve: ${{ needs.setup.outputs.auto_approve_infra == 'true' }}
      dry_run: ${{ needs.setup.outputs.dry_run == 'true' }}
    secrets: inherit

  # Stage 2: Backend (API + Workers) - runs after infra (if enabled)
  backend:
    name: Backend
    needs: [setup, infrastructure]
    if: |
      always() &&
      needs.setup.outputs.deploy_backend == 'true' &&
      (needs.infrastructure.result == 'success' || needs.infrastructure.result == 'skipped')
    uses: ./.github/workflows/_backend.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      dry_run: ${{ needs.setup.outputs.dry_run == 'true' }}
    secrets: inherit

  # Stage 3: Frontend (S3 + CloudFront) - runs in parallel with backend
  frontend:
    name: Frontend
    needs: [setup, infrastructure]
    if: |
      always() &&
      needs.setup.outputs.deploy_frontend == 'true' &&
      (needs.infrastructure.result == 'success' || needs.infrastructure.result == 'skipped')
    uses: ./.github/workflows/_frontend.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      dry_run: ${{ needs.setup.outputs.dry_run == 'true' }}
    secrets: inherit

  # Stage 4a: Mobile Full Build (Expo EAS)
  mobile:
    name: Mobile (Full Build)
    needs: [setup, backend, frontend]
    if: |
      always() &&
      needs.setup.outputs.deploy_mobile == 'true' &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    uses: ./.github/workflows/_mobile.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      dry_run: ${{ needs.setup.outputs.dry_run == 'true' }}
    secrets: inherit

  # Stage 4b: Mobile OTA Update (Fast deployment)
  mobile-ota:
    name: Mobile (OTA Update)
    needs: [setup, backend, frontend]
    if: |
      always() &&
      needs.setup.outputs.deploy_mobile_ota == 'true' &&
      (needs.backend.result == 'success' || needs.backend.result == 'skipped') &&
      (needs.frontend.result == 'success' || needs.frontend.result == 'skipped')
    uses: ./.github/workflows/_mobile-ota.yml
    with:
      environment: ${{ needs.setup.outputs.environment }}
      channel: ${{ needs.setup.outputs.mobile_ota_channel }}
      message: 'Deploy from GitHub Actions'
    secrets: inherit

  # Final Summary
  summary:
    name: Deployment Summary
    needs: [setup, infrastructure, backend, frontend, mobile, mobile-ota]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "========================================"
          echo "DEPLOYMENT SUMMARY"
          echo "========================================"
          echo "Environment: ${{ needs.setup.outputs.environment }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "Stage Results:"
          echo "  Infrastructure: ${{ needs.infrastructure.result || 'skipped' }}"
          echo "  Backend: ${{ needs.backend.result || 'skipped' }}"
          echo "  Frontend: ${{ needs.frontend.result || 'skipped' }}"
          echo "  Mobile (Full): ${{ needs.mobile.result || 'skipped' }}"
          echo "  Mobile (OTA): ${{ needs.mobile-ota.result || 'skipped' }}"
          echo ""

          # Check overall status
          FAILED=false
          if [ "${{ needs.infrastructure.result }}" = "failure" ]; then FAILED=true; fi
          if [ "${{ needs.backend.result }}" = "failure" ]; then FAILED=true; fi
          if [ "${{ needs.frontend.result }}" = "failure" ]; then FAILED=true; fi
          if [ "${{ needs.mobile.result }}" = "failure" ]; then FAILED=true; fi
          if [ "${{ needs.mobile-ota.result }}" = "failure" ]; then FAILED=true; fi

          if [ "$FAILED" = "true" ]; then
            echo "STATUS: FAILED - One or more stages failed"
            echo "========================================"
            exit 1
          else
            echo "STATUS: SUCCESS"
            echo "========================================"
            echo ""
            echo "Deployment complete! Verify at:"
            echo "  Frontend: https://oncallshift.com"
            echo "  API Health: https://oncallshift.com/health"
            echo "  Version: https://oncallshift.com/version"
          fi

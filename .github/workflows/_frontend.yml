name: Frontend (S3 + CloudFront)

# Only callable from orchestrator - no standalone triggers
on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string
      dry_run:
        description: 'Dry run - build only, no deploy'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set environment variables
        id: set-vars
        run: |
          ENV="${{ inputs.environment }}"

          # Set S3 bucket per environment
          echo "S3_BUCKET=pagerduty-lite-${ENV}-web" >> $GITHUB_OUTPUT

          # Dynamically look up CloudFront distribution ID by comment/alias
          DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?contains(Aliases.Items, 'oncallshift.com') || contains(Comment, 'pagerduty-lite-${ENV}')].Id" --output text | head -1)

          if [ -z "$DIST_ID" ]; then
            # Fallback: find distribution with matching S3 origin
            DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Origins.Items[?contains(DomainName, 'pagerduty-lite-${ENV}-web')]].Id" --output text | head -1)
          fi

          echo "CLOUDFRONT_DIST_ID=${DIST_ID}" >> $GITHUB_OUTPUT
          echo "Found CloudFront Distribution: ${DIST_ID}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ inputs.environment == 'prod' && 'https://oncallshift.com' || 'https://oncallshift.com' }}

      - name: Deploy to S3
        if: inputs.dry_run != true
        run: |
          aws s3 sync frontend/dist/ s3://${{ steps.set-vars.outputs.S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront cache
        if: inputs.dry_run != true
        run: |
          DIST_ID="${{ steps.set-vars.outputs.CLOUDFRONT_DIST_ID }}"
          if [ -n "$DIST_ID" ]; then
            aws cloudfront create-invalidation \
              --distribution-id $DIST_ID \
              --paths "/*"
            echo "CloudFront cache invalidated"
          else
            echo "No CloudFront distribution ID configured for this environment"
          fi

      - name: Dry run summary
        if: inputs.dry_run == true
        run: |
          echo "🔍 DRY RUN - Frontend Build Summary"
          echo "===================================="
          echo "Environment: ${{ inputs.environment }}"
          echo ""
          echo "Build output:"
          ls -la frontend/dist/
          echo ""
          echo "Would deploy to:"
          echo "  - S3 Bucket: ${{ steps.set-vars.outputs.S3_BUCKET }}"
          echo "  - CloudFront Distribution: ${{ steps.set-vars.outputs.CLOUDFRONT_DIST_ID }}"
          echo ""
          echo "⚠️  DRY RUN MODE - No files uploaded, no cache invalidated"

      - name: Frontend deployment summary
        if: inputs.dry_run != true
        run: |
          echo "✅ Frontend deployment complete!"
          echo "Environment: ${{ inputs.environment }}"
          echo "S3 Bucket: ${{ steps.set-vars.outputs.S3_BUCKET }}"
          echo "CloudFront: ${{ steps.set-vars.outputs.CLOUDFRONT_DIST_ID }}"

name: Frontend (S3 + CloudFront)

# Only callable from orchestrator - no standalone triggers
on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string
      dry_run:
        description: 'Dry run - build only, no deploy'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set environment variables
        id: set-vars
        run: |
          ENV="${{ inputs.environment }}"

          # S3 bucket name follows oncallshift naming convention
          echo "S3_BUCKET=oncallshift-${ENV}-web" >> $GITHUB_OUTPUT

          # CloudFront distribution ID - hardcoded for dev environment
          # In production, this could be looked up dynamically
          if [ "$ENV" = "dev" ]; then
            echo "CLOUDFRONT_DIST_ID=E7BQGD7BWAB8B" >> $GITHUB_OUTPUT
          else
            # Try to find CloudFront distribution dynamically
            DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?contains(Aliases.Items, 'oncallshift.com') || contains(Comment, 'oncallshift-${ENV}')].Id" --output text | head -1)
            if [ -z "$DIST_ID" ]; then
              # Fallback: find distribution with matching S3 origin
              DIST_ID=$(aws cloudfront list-distributions --query "DistributionList.Items[?Origins.Items[?contains(DomainName, 'oncallshift-${ENV}-web')]].Id" --output text | head -1)
            fi
            echo "CLOUDFRONT_DIST_ID=${DIST_ID}" >> $GITHUB_OUTPUT
          fi

          echo "Found CloudFront Distribution: ${DIST_ID:-E7BQGD7BWAB8B}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc -b

      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          VITE_API_URL: https://oncallshift.com

      - name: Deploy to S3
        if: inputs.dry_run != true
        run: |
          echo "Uploading frontend to S3..."
          aws s3 sync frontend/dist/ s3://${{ steps.set-vars.outputs.S3_BUCKET }}/ --delete
          echo "Frontend uploaded to S3"

      - name: Invalidate CloudFront cache
        if: inputs.dry_run != true
        run: |
          DIST_ID="${{ steps.set-vars.outputs.CLOUDFRONT_DIST_ID }}"
          if [ -n "$DIST_ID" ]; then
            echo "Invalidating CloudFront cache..."
            INVALIDATION_ID=$(aws cloudfront create-invalidation \
              --distribution-id $DIST_ID \
              --paths "/*" \
              --query 'Invalidation.Id' \
              --output text)
            echo "CloudFront invalidation created: $INVALIDATION_ID"
          else
            echo "No CloudFront distribution ID configured for this environment"
          fi

      # Verify frontend is accessible
      - name: Verify frontend health
        if: inputs.dry_run != true
        run: |
          echo "Verifying frontend is accessible..."
          # Wait for CloudFront invalidation to propagate
          sleep 30

          MAX_RETRIES=6
          RETRY_DELAY=10

          for i in $(seq 1 $MAX_RETRIES); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://oncallshift.com/)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Frontend health check passed (HTTP $HTTP_CODE)"
              exit 0
            fi

            echo "Frontend check returned HTTP $HTTP_CODE, retrying... ($i/$MAX_RETRIES)"
            sleep $RETRY_DELAY
          done

          echo "Warning: Frontend returned HTTP $HTTP_CODE after $MAX_RETRIES attempts"
          echo "This may be due to CloudFront caching - verify manually"

      - name: Dry run summary
        if: inputs.dry_run == true
        run: |
          echo "DRY RUN - Frontend Build Summary"
          echo "===================================="
          echo "Environment: ${{ inputs.environment }}"
          echo ""
          echo "Build output:"
          ls -la frontend/dist/
          echo ""
          echo "Would deploy to:"
          echo "  - S3 Bucket: ${{ steps.set-vars.outputs.S3_BUCKET }}"
          echo "  - CloudFront Distribution: ${{ steps.set-vars.outputs.CLOUDFRONT_DIST_ID }}"
          echo ""
          echo "DRY RUN MODE - No files uploaded, no cache invalidated"

      - name: Frontend deployment summary
        if: inputs.dry_run != true
        run: |
          echo "Frontend deployment complete!"
          echo "================================"
          echo "Environment: ${{ inputs.environment }}"
          echo "S3 Bucket: ${{ steps.set-vars.outputs.S3_BUCKET }}"
          echo "CloudFront: ${{ steps.set-vars.outputs.CLOUDFRONT_DIST_ID }}"
          echo "URL: https://oncallshift.com"

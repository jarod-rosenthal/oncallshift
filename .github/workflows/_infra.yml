name: Infrastructure (Terraform)

# Only callable from orchestrator - no standalone triggers
on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  TF_VERSION: '1.5'

jobs:
  terraform:
    name: Terraform ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infrastructure/terraform/environments/${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -out=tfplan -input=false
        continue-on-error: true

      - name: Terraform Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: terraform apply -auto-approve tfplan

      - name: Terraform Output
        if: success()
        run: terraform output -json > terraform-outputs.json

      - name: Upload Terraform Outputs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs-${{ inputs.environment }}
          path: infrastructure/terraform/environments/${{ inputs.environment }}/terraform-outputs.json
          retention-days: 7

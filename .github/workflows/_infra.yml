name: Infrastructure (Terraform)

# Only callable from orchestrator - no standalone triggers
on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: string
      auto_approve:
        description: 'Skip approval and apply immediately (use with caution)'
        required: false
        type: boolean
        default: false
      dry_run:
        description: 'Dry run - plan only, no apply'
        required: false
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  TF_VERSION: '1.5'

jobs:
  plan:
    name: Terraform Plan (${{ inputs.environment }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}
      issue_number: ${{ steps.create-issue.outputs.issue_number }}
      has_changes: ${{ steps.plan.outputs.has_changes }}
    defaults:
      run:
        working-directory: infrastructure/terraform/environments/${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -out=tfplan -input=false -detailed-exitcode 2>&1 | tee plan_output.txt
          EXITCODE=${PIPESTATUS[0]}
          echo "exitcode=$EXITCODE" >> $GITHUB_OUTPUT

          # Exit code 0 = no changes, 1 = error, 2 = changes present
          if [ $EXITCODE -eq 2 ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            exit 0
          elif [ $EXITCODE -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Generate Plan Summary
        id: plan-summary
        if: steps.plan.outputs.has_changes == 'true'
        run: |
          # Create human-readable plan
          terraform show -no-color tfplan > plan_readable.txt

          # Get resource counts
          ADD=$(grep -c "will be created" plan_readable.txt || echo "0")
          CHANGE=$(grep -c "will be updated" plan_readable.txt || echo "0")
          DESTROY=$(grep -c "will be destroyed" plan_readable.txt || echo "0")

          echo "add=$ADD" >> $GITHUB_OUTPUT
          echo "change=$CHANGE" >> $GITHUB_OUTPUT
          echo "destroy=$DESTROY" >> $GITHUB_OUTPUT

      - name: Upload Plan Artifact
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.run_id }}
          path: |
            infrastructure/terraform/environments/${{ inputs.environment }}/tfplan
            infrastructure/terraform/environments/${{ inputs.environment }}/plan_readable.txt
          retention-days: 1

      - name: Dry Run Summary
        if: steps.plan.outputs.has_changes == 'true' && inputs.dry_run == true
        run: |
          echo "🔍 DRY RUN - Terraform Plan Summary"
          echo "===================================="
          echo "Environment: ${{ inputs.environment }}"
          echo ""
          cat plan_readable.txt
          echo ""
          echo "⚠️  DRY RUN MODE - No changes will be applied"

      - name: Create or Update Approval Issue
        id: create-issue
        if: steps.plan.outputs.has_changes == 'true' && inputs.auto_approve != true && inputs.dry_run != true
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ADD_COUNT: ${{ steps.plan-summary.outputs.add || '0' }}
          CHANGE_COUNT: ${{ steps.plan-summary.outputs.change || '0' }}
          DESTROY_COUNT: ${{ steps.plan-summary.outputs.destroy || '0' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planPath = `infrastructure/terraform/environments/${process.env.ENVIRONMENT}/plan_readable.txt`;
            let planOutput = fs.readFileSync(planPath, 'utf8');

            // Truncate if too long for GitHub issue (max ~65k chars)
            if (planOutput.length > 60000) {
              planOutput = planOutput.substring(0, 60000) + '\n\n... (truncated, see workflow artifacts for full plan)';
            }

            const issueTitle = `Terraform Plan Approval Required: ${process.env.ENVIRONMENT} - Run #${process.env.RUN_NUMBER}`;

            const issueBody = `## Terraform Plan for \`${process.env.ENVIRONMENT}\` Environment

**Workflow Run:** [#${process.env.RUN_NUMBER}](${process.env.SERVER_URL}/${process.env.REPOSITORY}/actions/runs/${process.env.RUN_ID})
**Triggered by:** @${process.env.ACTOR}
**Branch:** \`${process.env.REF_NAME}\`
**Commit:** \`${process.env.SHA}\`

### Summary
| Action | Count |
|--------|-------|
| Add | ${process.env.ADD_COUNT} |
| Change | ${process.env.CHANGE_COUNT} |
| Destroy | ${process.env.DESTROY_COUNT} |

### Plan Output
<details>
<summary>Click to expand Terraform plan</summary>

\`\`\`hcl
${planOutput}
\`\`\`

</details>

---

### Approval Instructions

**To approve this plan, add the \`approved\` label to this issue.**

The workflow will automatically detect the label and proceed with applying the changes.

**This approval will timeout in 4 hours.**

---
*This issue was automatically generated by the CI/CD pipeline.*
`;

            // Check for existing open issue for this environment
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['terraform-plan', `env:${process.env.ENVIRONMENT}`]
            });

            let issueNumber;

            if (existingIssues.data.length > 0) {
              // Update existing issue
              const issue = existingIssues.data[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title: issueTitle,
                body: issueBody
              });
              // Remove approved label if it exists from previous run
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: 'approved'
                });
              } catch (e) {
                // Label might not exist, that's fine
              }
              issueNumber = issue.number;
              console.log(`Updated existing issue #${issueNumber}`);
            } else {
              // Create new issue
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['terraform-plan', `env:${process.env.ENVIRONMENT}`]
              });
              issueNumber = newIssue.data.number;
              console.log(`Created new issue #${issueNumber}`);
            }

            core.setOutput('issue_number', issueNumber);
            return issueNumber;

      - name: No Changes Detected
        if: steps.plan.outputs.has_changes == 'false'
        run: |
          echo "No infrastructure changes detected for ${{ inputs.environment }}"
          echo "Skipping approval process"

  wait-for-approval:
    name: Wait for Approval (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.has_changes == 'true' && inputs.auto_approve != true && inputs.dry_run != true
    timeout-minutes: 240
    permissions:
      issues: read
    outputs:
      approved: ${{ steps.check-approval.outputs.approved }}

    steps:
      - name: Wait for approval label
        id: check-approval
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ needs.plan.outputs.issue_number }};
            const maxWaitMinutes = 240;
            const checkIntervalSeconds = 30;
            const maxChecks = (maxWaitMinutes * 60) / checkIntervalSeconds;

            console.log(`Waiting for 'approved' label on issue #${issueNumber}...`);
            console.log(`Will check every ${checkIntervalSeconds} seconds for up to ${maxWaitMinutes} minutes.`);

            for (let i = 0; i < maxChecks; i++) {
              const issue = await github.rest.issues.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber
              });

              const labels = issue.data.labels.map(l => l.name);

              if (labels.includes('approved')) {
                console.log('Approval received! Proceeding with apply...');
                core.setOutput('approved', 'true');
                return;
              }

              if (labels.includes('rejected')) {
                console.log('Plan was rejected. Stopping workflow.');
                core.setOutput('approved', 'false');
                core.setFailed('Terraform plan was rejected');
                return;
              }

              if (issue.data.state === 'closed') {
                console.log('Issue was closed without approval. Stopping workflow.');
                core.setOutput('approved', 'false');
                core.setFailed('Approval issue was closed without approval');
                return;
              }

              const waitedMinutes = Math.round((i * checkIntervalSeconds) / 60);
              if (i % 4 === 0) {
                console.log(`Still waiting... (${waitedMinutes} minutes elapsed)`);
              }

              await new Promise(resolve => setTimeout(resolve, checkIntervalSeconds * 1000));
            }

            core.setOutput('approved', 'false');
            core.setFailed('Approval timeout - no approval received within 4 hours');

  apply:
    name: Terraform Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: [plan, wait-for-approval]
    if: |
      always() &&
      needs.plan.outputs.has_changes == 'true' &&
      needs.wait-for-approval.outputs.approved == 'true'
    permissions:
      contents: read
      id-token: write
      issues: write
    defaults:
      run:
        working-directory: infrastructure/terraform/environments/${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.run_id }}
          path: infrastructure/terraform/environments/${{ inputs.environment }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Terraform Output
        if: success()
        run: terraform output -json > terraform-outputs.json

      - name: Upload Terraform Outputs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs-${{ inputs.environment }}
          path: infrastructure/terraform/environments/${{ inputs.environment }}/terraform-outputs.json
          retention-days: 7

      - name: Close Approval Issue
        if: always()
        env:
          ISSUE_NUMBER: ${{ needs.plan.outputs.issue_number }}
          JOB_STATUS: ${{ job.status }}
          ENVIRONMENT: ${{ inputs.environment }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER);
            if (!issueNumber) return;

            const status = process.env.JOB_STATUS;
            const comment = status === 'success'
              ? `## Terraform Apply Completed Successfully\n\nInfrastructure changes have been applied to \`${process.env.ENVIRONMENT}\`.`
              : `## Terraform Apply Failed\n\nPlease check the [workflow run](${process.env.SERVER_URL}/${process.env.REPOSITORY}/actions/runs/${process.env.RUN_ID}) for details.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: comment
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });

  apply-auto:
    name: Terraform Apply - Auto (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.has_changes == 'true' && inputs.auto_approve == true && inputs.dry_run != true
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infrastructure/terraform/environments/${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.environment }}-${{ github.run_id }}
          path: infrastructure/terraform/environments/${{ inputs.environment }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Terraform Output
        if: success()
        run: terraform output -json > terraform-outputs.json

      - name: Upload Terraform Outputs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs-${{ inputs.environment }}
          path: infrastructure/terraform/environments/${{ inputs.environment }}/terraform-outputs.json
          retention-days: 7

  skip-apply:
    name: No Changes to Apply
    runs-on: ubuntu-latest
    needs: plan
    if: needs.plan.outputs.has_changes == 'false'
    steps:
      - name: Skip notification
        run: |
          echo "No infrastructure changes to apply for ${{ inputs.environment }}"
          echo "Terraform plan showed no differences"

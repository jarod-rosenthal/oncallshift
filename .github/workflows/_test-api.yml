name: API Integration Tests

# Only callable from orchestrator - no standalone triggers
on:
  workflow_call:

jobs:
  test:
    name: API Tests (${{ matrix.suite }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        suite: [auth, incidents, webhooks, schedules]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run integration tests - ${{ matrix.suite }}
        working-directory: backend
        env:
          API_BASE_URL: https://oncallshift.com/api
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
        run: |
          npm run test:integration -- --testPathPattern=${{ matrix.suite }} --ci --reporters=default --reporters=jest-junit
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results-${{ matrix.suite }}
          path: |
            backend/junit.xml
            backend/coverage/
          retention-days: 30

  # Aggregate results
  results:
    name: API Test Results
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check test results
        run: |
          echo "API Integration Test Results"
          echo "============================"
          echo ""
          echo "All test suites have completed."
          echo "Check individual job results for details."
